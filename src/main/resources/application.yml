spring:
  application:
    name: zjz-ai-agent
  profiles:
    active: local
  ai:
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
            schema: classpath:schema/schema.sql
  # DataSource Config
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/zjz-ai-agent?rewriteBatchedStatements=true&serverTimezone=Asia/Shanghai
    username: root
    password: a1357924680
server:
  port: 8081
  servlet:
    context-path: /api
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: org.example.zjzaiagent.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

